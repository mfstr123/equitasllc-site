<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equitas Group LLC</title>

<style>
body {
  margin:0;
  font-family: Inter, Arial, sans-serif;
  background:#020814;
  color:white;
}

/* NAV */
.nav {
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.nav-inner {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
  min-height:88px;
}

.brand-logo {
  width:460px;
  max-width:48vw;
  max-height:110px;
}

.nav-links a {
  margin-left:24px;
  color:white;
  text-decoration:none;
}

/* BANNER */
.banner-strip {
  border:1px solid rgba(255,255,255,0.08);
  background: linear-gradient(90deg, rgba(7,18,38,0.42), rgba(7,18,38,0.18));
  min-height:120px;
  padding:26px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.banner-left {
  display:flex;
  flex-direction:column;
}

.eyebrow {
  font-size:18px;
  letter-spacing:0.25em;
  color:#d4a54d;
}

.metallic {
  background: linear-gradient(135deg,#efcf87,#9e7830,#dfe8f5,#7a9fd8,#f0d28a,#dce7f7);
  -webkit-background-clip:text;
  color:transparent;
  font-size:52px;
  font-weight:700;
  margin-top:8px;
}

.banner-logo {
  width:320px;
}

/* HERO */
.hero {
  padding:80px 40px;
}

.hero h1 {
  font-size:42px;
}

.hero p {
  font-size:16px;
  color:#ccc;
}

</style>
</head>

<body>

<header class="nav">
  <div class="nav-inner">
    <img src="equitas-logo.png" class="brand-logo">

    <div class="nav-links">
      <a href="#">About</a>
      <a href="#">Focus</a>
      <a href="#">Mission</a>
      <a href="#">Contact</a>
    </div>
  </div>
</header>

<!-- BANNER -->
<div class="banner-strip">
  <div class="banner-left">
    <div class="eyebrow">Equitas Group LLC</div>
    <div class="metallic">Strength. Growth. Trust.</div>
  </div>

  <img src="Equita Banner final.png" class="banner-logo">
</div>

<!-- HERO -->
<section class="hero">
  <h1>Stewarding growth, governance, and long-term enterprise value.</h1>
  <p>Equitas Group LLC operates as a holding company focused on ownership, strategy, and disciplined growth.</p>
</section>

</body>
</html>
