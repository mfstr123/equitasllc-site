<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equitas Group LLC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at center, rgba(16, 55, 122, 0.18), transparent 34%),
        linear-gradient(180deg, #020814 0%, #030b18 45%, #020611 100%);
      color: #f3f6fb;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    .background-logo-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .background-logo-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(20, 84, 182, 0.24), transparent 34%),
        radial-gradient(circle at center, rgba(225, 176, 78, 0.10), transparent 20%);
    }
    .background-logo {
      width: min(1120px, 92vw);
      opacity: 0.22;
      filter: drop-shadow(0 0 75px rgba(18, 78, 170, 0.42));
      position: relative;
      z-index: 1;
      transform: translate3d(0, 0, 0);
      will-change: transform;
      display:block;
    }
    .background-logo.depth {
      position: absolute;
      width: min(1180px, 96vw);
      opacity: 0.10;
      filter: blur(10px);
      z-index: 0;
    }
    .gold-streak {
      position: fixed;
      inset: -20% -10% auto -10%;
      height: 220px;
      background: linear-gradient(90deg, transparent 0%, rgba(212,165,77,0.00) 22%, rgba(212,165,77,0.22) 50%, rgba(255,222,158,0.11) 58%, rgba(212,165,77,0.00) 78%, transparent 100%);
      transform: translateX(-120%) rotate(-10deg);
      opacity: 0;
      pointer-events: none;
      z-index: 1;
      filter: blur(12px);
      will-change: transform, opacity;
    }

    .site-shell { position: relative; z-index: 2; }
    .container { width: min(1280px, calc(100% - 48px)); margin: 0 auto; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: rgba(2, 8, 20, 0.46);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-badge {
      width: 56px;
      height: 56px;
      border: 1px solid rgba(212,165,77,0.35);
      background: rgba(255,255,255,0.04);
      padding: 5px;
      box-shadow: 0 0 24px rgba(212,165,77,0.14);
      flex: 0 0 auto;
    }
    .brand-badge img { width: 100%; height: 100%; object-fit: contain; display:block; }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.34em;
      font-size: 11px;
      color: #d4a54d;
    }
    .brand-subtext { color: rgba(255,255,255,0.72); font-size: 13px; margin-top: 4px; }
    .nav-links {
      display: flex;
      gap: 28px;
      color: rgba(255,255,255,0.78);
      font-size: 15px;
    }
    .nav-links a:hover { color: #e0b767; }

    section { padding: 76px 0; position: relative; }

    .lux-gradient {
      background: linear-gradient(135deg, #e4c57a 0%, #9e7930 18%, #dfe7f2 36%, #7ea2d8 52%, #f3d48a 72%, #d9e4f6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero {
      min-height: calc(100vh - 84px);
      display: flex;
      align-items: center;
      padding-top: 6px;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 24px;
      align-items: center;
    }
    .glass-panel {
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(135deg, rgba(7,18,38,0.42), rgba(4,10,24,0.22));
      backdrop-filter: blur(16px);
      box-rgba(0,0,0,0.28);
      position: relative;
      overflow: hidden;
    }
    .glass-panel::before,
    .mission-block::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,215,140,0.07), transparent 22%, rgba(129,171,224,0.05) 58%, transparent 100%);
      pointer-events: none;
    }
    .glass-panel::after,
    .mission-block::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -34px;
      height: 34px;
      background: linear-gradient(180,0.14), rgba(255,255,255,0.02));
      opacity: 0.18;
      filter: blur(16px);
      pointer-events: none;
    }
    .hero-card { padding: 28px 30px; }
    .hero h1 {
      font-size: clamp(26px, 3.5vw, 46px);
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-top: 10px;
      max-width: 620px;
    }
    .hero p {
      max-width: 580px;
      margin-top: 14px;
      color: rgba(255,255,255,0.74);
      font-size: 15px;
      line-height: 1.7;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }
    .btn-primary,
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      transition: 0.25s ease;
    }
    background: linear-gradient(135deg, #f0cf86, #9a7027 55%, #d9e4f6);
      color: #07101f;
      border: 1px solid rgba(212,165,77,0.55);
      box-shadow: 0 10px 30px rgba(201,154,58,0.24);
    }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.92);
    }
    .btn-secondary:hover { border-color: rgba(212,165,77,0.45); color: #e0b767; }

    .stack { display: grid; gap: 14px; }
    .mini-card {
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025));
      padding: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 50px rgba(0,ition: relative;
      overflow: hidden;
    }
    .mini-card h3 {
      font-size: 19px;
      margin-bottom: 10px;
      font-weight: 700;
      background: linear-gradient(135deg, #f0cf86, #dfe7f2 40%, #7ea2d8 68%, #f3d48a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .mini-card p { color: rgba(255,255,255,0.72); line-height: 1.66; font-size: 14px; }

    .section-label {
      text-transform: uppercase;
      letter-spacing: 0.34em;
      font-size: 12px;
      color: #d4a54d;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: clamp(28px, 3.2vw, 42px);
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: -0.03em;
      max-width: 900px;
    }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .panel-pad { padding: 30px; }
    .body-copy {
      color: rgba(255,255,255,0.76);
      line-height: 1.82;
      font-size: 15px;
      margin-top: 18px;
    }
    .standards-grid,
    .services-grid {
      display: grid;
      gap: 18px;
      margin-top: 22px;
    }
    .standards-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .services-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .standard-pill,
    .service-card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(1ndard-pill {
      padding: 16px 18px;
      color: rgba(255,255,255,0.84);
      font-size: 15px;
    }
    .service-card {
      padding: 24px;
      transition: transform 0.22s ease, border-color 0.22s ease;
      position: relative;
      overflow: hidden;
    }
    .service-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212,165,77,0.34);
    }
    .service-card h3 {
      font-size: 20px;
      margin-bottom: 12px;
      font-weight: 700;
      background: linear-gradient(135deg, #f0cf86, #dfe7f2 35%, #7ea2d8 70%, #f3d48a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .service-card p { color: rgba(255,255,255,0.74); line-height: 1.7; }

    .mission-block {
      padding: 38px;
      border: 1px solid rgba(212,165,77,0.24);
      background: linear-gradient(135deg, rgba(8,21,44,0.60), rgba(3,7,18,0.38));
      box-shadow: ,0,0.30);
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }
    .mission-block p { margin-top: 18px; font-size: 16px; line-height: 1.82; color: rgba(255,255,255,0.82); max-width: 1080px; }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 0.8fr;
      gap: 24px;
    }
    .contact-list { display: grid; gap: 22px; }
    .contact-item small {
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: #d4a54d;
      font-size: 11px;
      margin-bottom: 8px;
    }
    .contact-item div { font-size: 17px; color: rgba(255,255,255,0.86); }

    @media (max-width: 1100px) {
      .hero-grid,
      .two-col,
      .contact-grid,
      .services-grid { grid-template-columns: 1fr 1fr; }
      .stack { grid-column: 1 / -1; }
    }
    @media (max-width: 820px) {
      .nav-inner,
      .hero-grid,
      .two-col,
      .contact-grid,
      .services-grid,
      .standards-grid { grid-template-columns: 1fr; display: grid; }
      .nav-inner { gap: 18px; }
      .nav-links { flex-wrap: wrap; gap: 16px; }
      .hero-card,
      .panel-pad,
      .mission-block { padding: 24px; }
      .container { width: min(1280px, calc(100% - 28px)); }
      .background-logo { width: min(760px, 108vw); opacity: 0.18; }
      .background-logo.depth { width: min(820px, 112vw); }
      .brand-subtext { font-size: 13px; }
    }
